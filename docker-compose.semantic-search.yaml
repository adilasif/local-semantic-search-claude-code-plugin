# Streamlined semantic search services only (no inference model)
# Usage: docker compose -f docker-compose.semantic-search.yaml up -d

services:
  embedding-model:
    image: adilaasif/codebase-index-embed:sm120-cu131-v1
    env_file:
      - ./codebase-indexing/.env
    depends_on:
      - db-vector
    profiles: ["semantic-search"]
    container_name: embedding-inference
    cpuset: "0-13"
    restart: unless-stopped
    labels:
      - "ephemeral=true"
      - "persistence=none"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8000 && echo -e 'POST /embed HTTP/1.1\\r\\nHost: localhost\\r\\nContent-Type: application/json\\r\\nContent-Length: 35\\r\\n\\r\\n{\"inputs\":\"health\",\"truncate\":true}' >&3 && head -1 <&3 | grep -q '200 OK' && exec 3>&-"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    runtime: nvidia
    pid: host
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ${HF_CACHE_DIR}:/data
    command:
      - --model-id
      - ${EMBEDDING_MODEL_PATH}
      - --pooling
      - last-token
      - --auto-truncate
      - --dtype
      - "float16"
      - --tokenization-workers
      - "4"
      - --max-client-batch-size
      - "${MAX_CLIENT_BATCH_SIZE:-128}"
      - --max-batch-tokens
      - "${MAX_BATCH_TOKENS:-16384}"

  embedding-manager:
    image: adilaasif/codebase-index-rerank:sm120-cu131-v1
    env_file:
      - ./codebase-indexing/.env
    depends_on:
      embedding-model:
        condition: service_healthy
      db-vector:
        condition: service_started
    profiles: ["semantic-search"]
    container_name: embedding-manager
    cpuset: "14-27"
    restart: unless-stopped
    labels:
      - "ephemeral=true"
      - "persistence=none"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8000 && echo -e 'POST /v1/embeddings HTTP/1.1\\r\\nHost: localhost\\r\\nContent-Type: application/json\\r\\nContent-Length: 33\\r\\n\\r\\n{\"input\":\"health\",\"model\":\"test\"}' >&3 && head -1 <&3 | grep -q '200 OK' && exec 3>&-"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    runtime: nvidia
    pid: host
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "1335:8000"
    volumes:
      - ${HF_CACHE_DIR}:/data
    environment:
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - OMP_NUM_THREADS=14
      - MKL_NUM_THREADS=14
      - RERANK_BATCH_SIZE=64
      - TEI_BASE_URL=${TEI_BASE_URL}
      - MODEL_PATH=${RERANKER_MODEL_PATH}
      - PORT=8000
      - HF_HUB_OFFLINE=1

  db-vector:
    image: qdrant/qdrant:latest
    profiles: ["semantic-search"]
    container_name: db-vector
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    labels:
      - "ephemeral=false"
      - "persistence=hfs"
    volumes:
      - ${HOME}/.qdrant_data:/qdrant/storage
